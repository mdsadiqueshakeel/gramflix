
services:
  backend:
    build: ./referral-wallet-system
    image: local-backend:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=SuperSecretKey
    healthcheck:
      test: ["CMD-SHELL", "curl -u admin:password -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  frontend:
    build:
      context: ./my-app
      args:
        NEXT_PUBLIC_BACKEND_URL: "https://api.gramflix.in"
    image: local-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend
