services:
  backend:
    build:
      context: ./referral-wallet-system
      dockerfile: Dockerfile
    image: gramflix-backend:latest
    container_name: gramflix-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=SuperSecretKey

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: gramflix-frontend:latest
    container_name: gramflix-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
