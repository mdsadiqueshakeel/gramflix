name: Deploy Gramflix to EC2

on:
  push:
    branches: [ "master" ]   # runs when pushing to master

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-003663f28cf482aa0
  APP_DIR: /home/ec2-user/gramflix

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy using SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=instanceIds,Values=${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Gramflix Deployment" \
            --parameters 'commands=[
              "echo === Cleaning Docker ===",
              "sudo find /var/lib/docker/containers/ -name *-json.log -exec truncate -s 0 {} \;",
              "docker system prune -af --volumes",

              "echo === Updating repo ===",
              "if [ -d \"${APP_DIR}/.git\" ]; then cd ${APP_DIR} && git reset --hard && git pull origin master; else git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/mdsadiqueshakeel/gramflix.git ${APP_DIR}; fi",

              "echo === Rebuilding containers ===",
              "cd ${APP_DIR} && docker-compose -f docker-compose.prod.yml down && docker-compose -f docker-compose.prod.yml up -d --build"
            ]' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${INSTANCE_ID}"