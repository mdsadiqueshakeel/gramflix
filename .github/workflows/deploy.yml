name: Deploy GramFlix to EC2

on:
  push:
    branches: [ "master" ]

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-003663f28cf482aa0       # your EC2 instance ID
  APP_DIR: /home/ec2-user/gramflix

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM (SSH)
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=instanceIds,Values=${i-003663f28cf482aa0}" \
            --document-name "AWS-RunShellScript" \
            --comment "GramFlix Deployment via SSH" \
            --parameters "commands=[
              \"mkdir -p ${APP_DIR}\",

              \"# 🧹 Clean Docker logs + unused data\",
              \"sudo find /var/lib/docker/containers/ -name '*-json.log' -exec truncate -s 0 {} \;\",
              \"sudo docker system prune -af --volumes\",

              \"# 🔄 Update repo via SSH\",
              \"if [ -d '${APP_DIR}/.git' ]; then cd ${APP_DIR} && git reset --hard && git pull origin master; \
               else git clone git@github.com:mdsadiqueshakeel/gramflix.git ${APP_DIR}; fi\",

              \"# 🚀 Rebuild containers\",
              \"cd ${APP_DIR} && sudo docker-compose -f docker-compose.prod.yml down && sudo docker-compose -f docker-compose.prod.yml up -d --build\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${INSTANCE_ID}"